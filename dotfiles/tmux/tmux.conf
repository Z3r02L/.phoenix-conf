# --- Главное ---
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Меняем префикс на Alt + a
set -g prefix M-a
unbind C-b
bind M-a send-prefix

# Включаем мышь
set -g mouse on

# Начинаем отсчет окон и панелей с 1 (а не с 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# --- Навигация ---

# Быстрое переключение панелей (Alt + h,j,k,l) без префикса
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Изменение размера панелей стрелочками (Prefix + стрелка)
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# Изменение размера панелей (Prefix + H,J,K,L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Интуитивные сплиты
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Закрыть панель (q - quit)
bind q confirm-before -p "Kill pane? (y/n)" kill-pane

# Перезагрузка конфига (r - reload)
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Сохраняем текущий путь при создании нового окна
bind c new-window -c "#{pane_current_path}"

# --- Оформление (Status Bar) ---
set -g status-position top
set -g status-style "bg=default,fg=default"

set -g status-left-length 50
set -g status-left "#[fg=blue,bold] #S #[fg=white,nobold] "

set -g status-right-length 100
set -g status-right "#[fg=white] #[fg=magenta]%H:%M #[fg=white] #[fg=blue]#{host} "

setw -g window-status-current-format "#[fg=cyan,bold] #I:#W* "
setw -g window-status-format "#[fg=white,nobold] #I:#W  "

# --- Режим Vim (Copy Mode) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Мышь: выделение не пропадает при отпускании кнопки
unbind -T copy-mode-vi MouseDragEnd1Pane

# Попап для быстрых команд (Ctrl+a, T)
bind T display-popup -E -w 80% -h 80% "btop"

# --- Плагины (через TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Настройки tmux-yank
set -g @override_copy_command 'wl-copy'
set -g @yank_selection_mouse 'clipboard' # копировать в системный буфер при выделении мышью

# Автоматическое сохранение сессий
set -g @continuum-restore 'on'

# Инициализация менеджера плагинов (должна быть в самом конце)
run '~/.tmux/plugins/tpm/tpm'
