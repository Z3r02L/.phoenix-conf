# Основные настройки tmux

# Установить префикс на Ctrl + a (вместо Ctrl + b по умолчанию)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Мышиные настройки
set-option -g mouse on

# Установить статус бар
set-option -g status-bg black
set-option -g status-fg white
set-option -g status-left '#[fg=green]#H#[default] #[fg=yellow]#(whoami)#[default]'
set-option -g status-right '#[fg=cyan]%Y-%m-%d %H:%M#[default]'

# Установить настройки окна
set-window-option -g window-status-current-bg red
set-window-option -g window-status-current-attr bold

# Горячие клавиши для создания и навигации
bind-key c new-window
bind-key - new-window -c "#{pane_current_path}"
bind-key w choose-window
bind-key % split-window -h
bind-key '"' split-window -v

# Повторное подключение к сессии
bind-key d detach-client
