# Mango WM Configuration
# This file is symlinked to ~/.config/mango/config.conf

# ── General ──────────────────────────────────────────────────────────────────
# Auto-start essential components
exec-once = noctalia-shell
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start xdg-desktop-portal-gnome

# ── Input ────────────────────────────────────────────────────────────────────
xkb_rules_layout = us,ru
xkb_rules_options = grp:alt_shift_toggle
repeat_rate = 25
repeat_delay = 600

# ── Keybindings ──────────────────────────────────────────────────────────────
# Mod key is Super (Windows key)
# Syntax: bind = MODS, KEY, DISPATCHER, ARGS

# Basic Actions
bind = Super, Q, killclient
bind = Super, Return, spawn, kitty
bind = Super, D, spawn, fuzzel
bind = Super, F, togglefullscreen
bind = Super, V, togglefloating
bind = Super, O, toggleoverview

# App Launchers
bind = Super, B, spawn, brave
bind = Super, T, spawn, telegram-desktop
bind = Super, Z, spawn, zed
bind = Super, N, spawn, obsidian

# System Actions
bind = Super+Shift, E, quit
bind = Super+Shift, R, reload_config
bind = Super+Alt, L, spawn, swaylock

# ── Media Keys ───────────────────────────────────────────────────────────────
# Audio
bind = , XF86AudioRaiseVolume, spawn, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, spawn, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, spawn, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, spawn, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Playback
bind = , XF86AudioPlay, spawn, playerctl play-pause
bind = , XF86AudioNext, spawn, playerctl next
bind = , XF86AudioPrev, spawn, playerctl previous

# Brightness
bind = , XF86MonBrightnessUp, spawn, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, spawn, brightnessctl set 10%-

# ── Screenshots ──────────────────────────────────────────────────────────────
# Area screenshot to clipboard
bind = , Print, spawn, grim -g "$(slurp)" - | wl-copy
# Full screenshot to Pictures
bind = Shift, Print, spawn, grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%m-%S).png

# ── Navigation ───────────────────────────────────────────────────────────────
# Focus Movement
bind = Super, H, focusstack, -1
bind = Super, L, focusstack, 1
bind = Super, J, focusstack, 1
bind = Super, K, focusstack, -1

# Mouse Scroll Navigation
bind = Super, mouse_up, focusstack, -1
bind = Super, mouse_down, focusstack, 1


# Workspaces (Views)
bind = Super, 1, view, 1
bind = Super, 2, view, 2
bind = Super, 3, view, 3
bind = Super, 4, view, 4

# Move to Workspace (Tags)
bind = Super+Shift, 1, tag, 1
bind = Super+Shift, 2, tag, 2
bind = Super+Shift, 3, tag, 3
bind = Super+Shift, 4, tag, 4

