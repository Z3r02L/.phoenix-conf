# Configuration for starship prompt (Gruvbox Edition)

# Use a custom format for a clean, modern look
format = """
[‚ĖĎ‚Ėí‚Ėď](#7c6f64)\
[ ÔĆď ](bg:#7c6f64 fg:#ebdbb2)\
[Óāį](fg:#7c6f64 bg:#3c3836)\
$directory\
[Óāį](fg:#3c3836 bg:#504945)\
$git_branch\
$git_status\
[Óāį](fg:#504945 bg:#665c54)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$nix_shell\
[Óāį](fg:#665c54 bg:#bdae93)\
$cmd_duration\
[Óāį](fg:#bdae93 bg:#d65d0e)\
$character\
[Óāį ](fg:#d65d0e)\
"""

# Wait for command completion
add_newline = true

[directory]
style = "bg:#3c3836 fg:#ebdbb2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:#504945 fg:#ebdbb2"
format = "[[ $symbol $branch ]($style)]"

[git_status]
style = "bg:#504945 fg:#fabd2f"
format = "[[($all_status$ahead_behind )]($style)]"

[nodejs]
symbol = "Óúė"
style = "bg:#665c54"
format = "[[ $symbol ($version) ]($style)]"

[rust]
symbol = "Óě®"
style = "bg:#665c54"
format = "[[ $symbol ($version) ]($style)]"

[nix_shell]
symbol = "ÔĆď"
style = "bg:#665c54 fg:#ebdbb2"
format = "[[ $symbol $state ]($style)]"

[cmd_duration]
style = "bg:#bdae93 fg:#3c3836"
format = "[[ ÔÄó $duration ]($style)]"

[character]
success_symbol = "[ bg:#d65d0e fg:#ebdbb2](bold  bg:#d65d0e) ÓöĎ"
error_symbol = "[ bg:#d65d0e fg:#cc241d](bold bg:#d65d0e) ÓöĎ"

[package]
disabled = true
