# Premium Web/Backend Developer Starship Configuration
# Theme: Noctalia Dark (Vibrant & Informative)
scan_timeout = 150

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$nix_shell\
$package\
$container\
$docker_context\
$line_break\
$character"""

right_format = """$python$nodejs$golang$rust$php$java$c$lua$cmd_duration$status$time"""

add_newline = true

# --- Core Elements ---

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold yellow)"

[os]
disabled = false
style = "bold white"

[directory]
truncation_length = 4
truncation_symbol = "ÔÇª/"
style = "bold cyan"
format = "in [$path]($style)[$read_only]($read_only_style) "
home_symbol = "¾▒éÁ ~"

[git_branch]
symbol = "´Éÿ "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
ahead = "Ôçí"
behind = "Ôçú"
diverged = "Ôçò"
up_to_date = "Ô£ö"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "┬╗"
deleted = "Ô£ÿ"

[nix_shell]
symbol = "´îô "
style = "bold blue"
format = "via [$symbol$state( $name)]($style) "
impure_msg = "impure"
pure_msg = "pure"

# --- Backend & Web Languages ---

[nodejs]
symbol = "¯£ÿ "
style = "bold green"
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".node-version"]
detect_extensions = ["js", "ts", "jsx", "tsx"]

[python]
symbol = "¯êÁ "
style = "bold yellow"
format = "[$symbol($version )]($style)"
pyenv_prefix = "venv "
detect_extensions = ["py"]

[golang]
symbol = "¯ÿº "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[rust]
symbol = "¯×¿ "
style = "bold red"
format = "[$symbol($version )]($style)"

[php]
symbol = "¯ÿê "
style = "bold blue"
format = "[$symbol($version )]($style)"

[package]
symbol = "¾░Åù "
style = "bold 208"
format = "is [$symbol$version]($style) "

# --- Dev Environment ---

[docker_context]
symbol = "¾░í¿ "
style = "bold blue"
format = "[$symbol$context]($style) "

[container]
symbol = "¾░Åû "
format = "[$symbol]($style) "

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [$duration]($style) "

[status]
disabled = false
symbol = "¾░»ê "
format = "[$symbol$int]($style) "

[time]
disabled = false
time_format = "%R" 
style = "dim white"
format = "at [$time]($style) "

# --- Modules to ignore or silent ---

[aws]
symbol = "¯î¢  "

[gcloud]
symbol = "¯î¢  "
